<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Requirement Completeness Scorecard</title>
<style>
  :root{
    --bg:#F7F5EE; --card:#FFFFFF; --line:#E5E1D4;
    --ink:#1C2A24; --soft:#6B7A70;
    --green:#1E4D3B; --green-soft:#E4EFE7;
    --amber:#C2731C; --amber-soft:#F9EEDD;
    --red:#B0432F; --red-soft:#F7E6E1;
    --cream:#EFEBDD;
    --mono:'IBM Plex Mono','SFMono-Regular',Consolas,monospace;
    --serif:'Iowan Old Style','Palatino Linotype',Georgia,serif;
    --sans:'IBM Plex Sans','Segoe UI',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);font-family:var(--sans);color:var(--ink);-webkit-font-smoothing:antialiased}
  .wrap{max-width:1240px;margin:0 auto;padding:24px 20px}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:inherit}
  textarea{font-family:var(--mono)}

  /* nav */
  .nav{display:flex;align-items:center;gap:20px;font-family:var(--mono);font-size:13px;margin-bottom:10px;flex-wrap:wrap}
  .nav button{padding-bottom:4px;color:var(--soft);border-bottom:2px solid transparent}
  .nav button.on{color:var(--ink);font-weight:700;border-bottom-color:var(--green)}
  .nav-right{margin-left:auto;display:flex;gap:8px;font-size:11px;align-items:center}
  .pill{padding:4px 8px;border-radius:5px;background:var(--cream);border:1px solid var(--line);color:var(--soft)}
  .pill.phi{background:var(--green-soft);color:var(--green);font-weight:700;border-color:var(--green)}
  .pill.nophi{background:var(--amber-soft);color:var(--amber);font-weight:700;border-color:var(--amber)}

  .eyebrow{font-size:10px;text-transform:uppercase;letter-spacing:.14em;font-family:var(--mono);color:var(--soft);margin-bottom:7px}
  h1{font-family:var(--serif);font-size:30px;margin-bottom:4px}
  .lede{font-size:14px;color:var(--soft);max-width:640px;line-height:1.55;margin-bottom:24px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:7px;padding:16px}
  .layout{display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap}
  .left{width:320px;flex-shrink:0}
  .right{flex:1;min-width:340px;display:flex;flex-direction:column;gap:16px}
  @media(max-width:900px){.left{width:100%}}

  /* left panel */
  .srcbtns{display:flex;gap:8px;margin-bottom:14px}
  .srcbtns .tabbtn{padding:6px 10px;border-radius:5px;font-size:12px;font-family:var(--mono)}
  .srcbtns .tabbtn.on{background:var(--cream);border:1px solid var(--line);font-weight:600}
  .srcbtns .ghost{margin-left:auto;color:var(--soft);font-family:var(--mono);font-size:12px}
  .select{border:1px solid var(--line);border-radius:5px;padding:8px 10px;font-size:13px;margin-bottom:12px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
  .storybtn{width:100%;text-align:left;border:1px solid var(--line);border-radius:5px;padding:8px 10px;font-size:13px;display:flex;justify-content:space-between;gap:8px;margin-bottom:6px}
  .storybtn.on{border-color:var(--green);background:var(--green-soft)}
  .storybtn .k{font-family:var(--mono);font-weight:700}
  .storybtn .sc{font-family:var(--mono);font-weight:700;flex-shrink:0}
  .origin{background:var(--cream);border-radius:5px;padding:8px;font-size:11px;font-family:var(--mono);color:var(--soft);margin:6px 0 16px;line-height:1.5}
  .llmbtn{width:100%;text-align:left;border:1px solid var(--line);border-radius:5px;padding:8px 10px;margin-bottom:6px}
  .llmbtn.on{border-color:var(--green);background:var(--green-soft)}
  .llmbtn .row{display:flex;justify-content:space-between;align-items:center}
  .llmbtn .nm{font-size:13px;font-weight:500}
  .llmbtn .meta{font-size:11px;font-family:var(--mono);color:var(--soft);margin-top:2px}
  .badge{font-size:9px;font-family:var(--mono);font-weight:700;padding:2px 5px;border-radius:4px}
  .badge.phi{background:var(--green-soft);color:var(--green);border:1px solid var(--green)}
  .badge.nophi{background:var(--amber-soft);color:var(--amber);border:1px solid var(--amber)}
  .llmnote{font-size:11px;color:var(--soft);line-height:1.5;margin:4px 0 14px}
  .primary{width:100%;padding:11px;border-radius:5px;background:var(--green);color:#fff;font-size:14px;font-weight:600}

  /* score header */
  .scorehead{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:12px}
  .scorehead h2{font-family:var(--serif);font-size:21px}
  .scorehead .sub{font-size:12px;font-family:var(--mono);color:var(--soft);margin-top:3px}
  .bignum{font-family:var(--serif);font-size:46px;font-weight:700;line-height:1}
  .bignum small{font-size:17px;color:var(--soft);font-weight:400}
  .verdict{display:inline-block;padding:4px 8px;border-radius:5px;font-size:12px;font-weight:600;margin-top:4px}
  .gauge{position:relative;height:12px;border-radius:99px;overflow:hidden;display:flex;margin-bottom:3px}
  .gauge .marker{position:absolute;top:0;height:12px;width:2px;background:var(--ink)}
  .gaugelbl{display:flex;font-size:10px;font-family:var(--mono);color:var(--soft);margin-bottom:14px}

  /* lint text */
  .storytext{font-size:15px;line-height:1.7;margin-bottom:8px}
  .lint{cursor:help;border-radius:3px;padding:0 2px;text-decoration-line:underline;text-decoration-style:wavy;text-decoration-thickness:2px;text-underline-offset:4px}
  .lint.amb{background:var(--amber-soft);text-decoration-color:var(--amber)}
  .lint.test{background:var(--red-soft);text-decoration-color:var(--red)}
  .lint.fixed-ok{background:var(--green-soft);text-decoration:none}
  .lintnote{border:1px dashed var(--line);border-radius:5px;padding:10px;font-size:13px;min-height:42px;display:flex;align-items:center;gap:6px;background:var(--bg)}
  .ruletag{font-family:var(--mono);font-size:10px;padding:2px 6px;border-radius:4px;margin-right:6px;flex-shrink:0}
  .ruletag.amb{background:var(--amber-soft);color:var(--amber)}
  .ruletag.test{background:var(--red-soft);color:var(--red)}

  /* criteria */
  .crithead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;gap:10px;flex-wrap:wrap}
  .drag{font-size:12px;font-family:var(--mono);color:var(--red)}
  .critrow{width:100%;display:flex;align-items:center;gap:12px;padding:8px;border-radius:5px;text-align:left}
  .critrow:hover{background:var(--bg)}
  .critrow.open{background:var(--bg)}
  .critname{width:180px;flex-shrink:0}
  .critname .n{font-size:13px;font-weight:500}
  .critname .m{font-size:10px;font-family:var(--mono);color:var(--soft)}
  .bar{flex:1;height:6px;border-radius:99px;background:var(--cream)}
  .bar>div{height:6px;border-radius:99px}
  .critpts{width:82px;text-align:right;font-family:var(--mono);font-size:13px;flex-shrink:0}
  .critpts span{color:var(--soft)}
  .critreason{margin:0 8px 8px;border:1px solid var(--line);background:var(--bg);border-radius:5px;padding:12px;font-size:13px;line-height:1.6}
  .critreason .d{font-family:var(--mono);color:var(--red)}

  .twocol{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:760px){.twocol{grid-template-columns:1fr}}
  .explain{font-family:var(--serif);font-style:italic;font-size:14px;line-height:1.65}
  ol.qs{padding-left:18px}
  ol.qs li{font-size:13px;line-height:1.5;margin-bottom:6px}
  .copyhint{font-size:11px;font-family:var(--mono);color:var(--green)}

  /* persona */
  .lens{padding:0}
  .lenstabs{display:flex;border-bottom:1px solid var(--line);align-items:center}
  .lenstabs button{padding:12px 18px;font-size:13px;font-weight:600;color:var(--soft);border-bottom:2px solid transparent}
  .lenstabs button.on{color:var(--green);border-bottom-color:var(--green)}
  .acceptall{margin-left:auto;margin-right:12px;padding:6px 10px;border:1px solid var(--green);color:var(--green);border-radius:5px;font-size:12px;font-weight:600}
  .lensbody{padding:16px;display:flex;flex-direction:column;gap:12px}
  .fixrow{display:flex;justify-content:space-between;gap:12px;border:1px solid var(--line);border-radius:5px;padding:12px}
  .fixrow.done{border-color:var(--green);background:#FAFCF9}
  .diff-del{font-family:var(--mono);font-size:13px;color:var(--red);background:var(--red-soft);text-decoration:line-through;padding:1px 4px;border-radius:3px}
  .diff-add{font-family:var(--mono);font-size:13px;color:var(--green);background:var(--green-soft);padding:1px 4px;border-radius:3px}
  .acceptbtn{flex-shrink:0;align-self:flex-start;padding:7px 12px;border-radius:5px;font-size:12px;font-weight:600;color:#fff;background:var(--green)}
  .acceptbtn.done{background:#4C7A3F}
  .depicon{width:20px;height:20px;border-radius:99px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
  .deprow{display:flex;gap:8px;align-items:flex-start;font-size:13px;padding:4px 0;line-height:1.5}
  .gherkin{font-family:var(--mono);font-size:12px;line-height:1.65;background:var(--bg);border:1px solid var(--line);border-radius:5px;padding:10px;white-space:pre-wrap;margin-bottom:8px}
  ul.tdata{list-style:none}
  ul.tdata li{font-size:13px;padding:2px 0}
  ul.tdata li::before{content:"▸ ";color:var(--green)}

  /* fixed story */
  .fixedcard{border:2px solid var(--green);border-radius:7px;padding:16px;background:var(--card)}
  .fixedcard .head{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px}
  .pendinghint{font-size:11px;font-family:var(--mono);color:var(--amber)}
  .fixedtext{background:var(--bg);border:1px solid var(--line);border-radius:5px;padding:12px;font-size:15px;line-height:1.7;margin:8px 0 12px}
  .fx-ok{background:var(--green-soft);color:var(--green);font-weight:600;border-radius:3px;padding:0 2px}
  .fx-pending{text-decoration:underline wavy var(--amber);text-underline-offset:3px}
  .applyrow{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .applybtn{padding:9px 16px;border-radius:5px;font-size:13px;font-weight:600;color:#fff;background:var(--green)}
  .applybtn.done{background:#4C7A3F;cursor:default}
  .applyhint{font-size:11px;font-family:var(--mono);color:var(--soft)}

  /* notes screen */
  .subtabs{display:flex;gap:4px}
  .subtabs button{padding:9px 16px;font-size:13px;font-weight:600;color:var(--soft);border:1px solid transparent;border-bottom:none;border-radius:6px 6px 0 0}
  .subtabs button.on{background:var(--card);color:var(--green);border-color:var(--line)}
  .fmtchips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
  .fmtchip{background:var(--cream);border:1px solid var(--line);border-radius:5px;padding:6px 10px;font-size:12px}
  .fmtchip b{font-family:var(--mono)}
  .fmtchip span{color:var(--soft)}
  .notesarea{width:100%;border:1px solid var(--line);background:var(--bg);border-radius:5px;padding:12px;font-size:13px;line-height:1.6;resize:vertical;margin-bottom:12px}
  .genrow{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .genbtn{padding:10px 16px;border-radius:5px;font-size:13px;font-weight:600;color:#fff;background:var(--green)}
  .genhint{font-size:11px;font-family:var(--mono);color:var(--soft)}
  .draft{border:1px solid var(--line);border-radius:5px;padding:12px;display:flex;justify-content:space-between;gap:12px;margin-bottom:10px}
  .draft .t{font-size:14px;font-weight:600;margin-bottom:4px}
  .draft .s{font-size:12px;font-style:italic;color:var(--soft);margin-bottom:4px}
  .draft .p{font-size:11px;font-family:var(--mono)}
  .draft .btns{display:flex;flex-direction:column;gap:6px;flex-shrink:0}
  .smallbtn{padding:7px 12px;border-radius:5px;font-size:12px;font-weight:600}
  .smallbtn.pri{background:var(--green);color:#fff}
  .smallbtn.sec{border:1px solid var(--line);color:var(--soft)}
  .histrow{border:1px solid var(--line);border-radius:5px;padding:12px;margin-bottom:10px}
  .histrow .head{display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px;margin-bottom:8px}
  .histrow .mt{font-size:14px;font-weight:600}
  .histrow .meta{font-size:11px;font-family:var(--mono);color:var(--soft)}
  .histchip{display:inline-block;background:var(--bg);border:1px solid var(--line);border-radius:5px;padding:5px 9px;font-size:12px;margin:0 6px 6px 0}
  .histchip b{font-family:var(--mono);color:var(--green)}
  .histchip span{color:var(--soft)}

  /* dashboard */
  .dashstrip{display:flex;gap:20px;align-items:center;flex-wrap:wrap}
  .dashstrip .cnt{display:flex;align-items:center;gap:7px;font-size:13px}
  .dot{width:10px;height:10px;border-radius:99px;display:inline-block}
  .dashgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  @media(max-width:760px){.dashgrid{grid-template-columns:1fr}}
  .dashcard{text-align:left;height:100%}
  .dashcard:hover .card{box-shadow:0 1px 4px rgba(0,0,0,.07)}
  .dashnum{font-family:var(--serif);font-size:26px;font-weight:700}

  /* settings */
  .setwrap{max-width:720px;display:flex;flex-direction:column;gap:16px}
  .setllm{width:100%;text-align:left;border:2px solid var(--line);border-radius:6px;padding:14px;margin-bottom:8px;background:var(--card)}
  .setllm.on{border-color:var(--green);background:var(--green-soft)}
  .wtrow{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px solid var(--line)}
  .wtrow span:last-child{font-family:var(--mono)}
  .wttotal{display:flex;justify-content:space-between;font-weight:700;color:var(--green);padding-top:8px;font-family:var(--mono)}
  .wtgrid{display:grid;grid-template-columns:1fr 1fr;column-gap:32px}
  @media(max-width:600px){.wtgrid{grid-template-columns:1fr}}
  .fineprint{margin-top:32px;font-size:10px;font-family:var(--mono);color:var(--soft);line-height:1.7}

  /* help page */
  .helpwrap{max-width:860px;display:flex;flex-direction:column;gap:16px}
  .helpintro{font-size:14px;line-height:1.65;color:var(--ink)}
  .flow{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:10px}
  .flowstep{background:var(--cream);border:1px solid var(--line);border-radius:5px;padding:6px 10px;font-size:12px;font-family:var(--mono)}
  .flowarrow{color:var(--soft);font-size:12px}
  .helpsection{font-family:var(--serif);font-size:19px;font-weight:700;margin:6px 0 -6px}
  .module{border:1px solid var(--line);border-radius:6px;padding:14px;margin-bottom:10px}
  .module:last-child{margin-bottom:0}
  .module .mt{font-size:14px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .module .mt .who{font-size:10px;font-family:var(--mono);font-weight:700;color:var(--green);background:var(--green-soft);border-radius:4px;padding:2px 6px}
  .whyhow{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:700px){.whyhow{grid-template-columns:1fr}}
  .whyhow .lbl{font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.12em;color:var(--soft);margin-bottom:4px}
  .whyhow p,.whyhow li{font-size:13px;line-height:1.6}
  .whyhow ol{padding-left:17px}
  .whyhow li{margin-bottom:3px}
  .tipbox{background:var(--green-soft);border:1px solid var(--green);border-radius:5px;padding:9px 11px;font-size:12px;line-height:1.55;margin-top:10px}
  .tipbox b{color:var(--green)}
</style>
</head>

<div class="wrap" id="app"></div>

<script>

 {id:"azure",name:"Azure OpenAI · GPT-4o",tenant:"Client tenant (Claritev)",phi:true,cost:"Client-billed",note:"All inference stays inside the client's Azure tenant. Approved for stories and meeting notes containing PHI or client data."},

 {key:"EQ-29",board:"Eqinox · EQ",phase:"In Progress",pts:5,

function lintSpanHtml(st){

  if(!p.rule)return esc(p.t);
  const ok=S.accepted.has(st.key+p.rule);
  return `<span class="lint ${p.kind} ${ok?'fixed-ok':''}" onmouseenter="lintHover(${i})" onmouseleave="lintHover(null)">${esc(p.t)}</span>`;
 }).join("");
}

function fixedStoryHtml(st){
 const fixes=fixesOf(st);
 const nAcc=fixes.filter(f=>S.accepted.has(st.key+f.rule)).length;
 if(nAcc===0)return "";
 const all=nAcc===fixes.length;
 const applied=S.applied.has(st.key);
 const body=st.lint.map(p=>{
  if(!p.rule)return esc(p.t);
  return S.accepted.has(st.key+p.rule)
   ?`<span class="fx-ok">${esc(p.fixed)}</span>`
   :`<span class="fx-pending">${esc(p.t)}</span>`;
 }).join("");
 return `<div class="fixedcard">
  <div class="head"><div class="eyebrow" style="margin:0">Fixed user story · ${nAcc}/${fixes.length} fixes accepted</div>
   ${all?"":'<span class="pendinghint">unaccepted phrases kept as-is</span>'}</div>
  <div class="fixedtext">${body}</div>
  <div class="applyrow">
   <button class="applybtn ${applied?'done':''}" onclick="applyJira('${st.key}')" ${applied?'disabled':''}>
    ${applied?'✓ Applied to Jira (EQ board)':'Apply to Jira →'}</button>
   <span class="applyhint">${applied?'Story description updated · change logged in ticket history':'Updates the story description via MCP-connected Jira · original kept in history'}</span>
  </div>
 </div>`;
}

   <p class="genhint" style="margin-top:12px;line-height:1.7">All criteria are mandatory — weights are team-configurable but must always sum to 100. Verdict bands: 90–100 ready · 75–89 minor · 60–74 needs refinement · &lt;60 not ready.</p>
  </div>
 </div>`;
}

function helpModule(title,who,why,how,tip){
 return `<div class="module">
  <div class="mt">${title}${who.map(w=>`<span class="who">${w}</span>`).join("")}</div>
  <div class="whyhow">
   <div><div class="lbl">Why it exists</div><p>${why}</p></div>
   <div><div class="lbl">How to use it</div><ol>${how.map(h=>`<li>${h}</li>`).join("")}</ol></div>
  </div>
  ${tip?`<div class="tipbox"><b>Tip:</b> ${tip}</div>`:""}
 </div>`;
}

function render(){
 const app=document.getElementById("app");
 let screen="";
 if(S.screen==="scorecard")screen=scorecardHtml();
 else if(S.screen==="notes")screen=notesHtml();
 else if(S.screen==="dashboard")screen=dashboardHtml();
 else if(S.screen==="help")screen=helpHtml();
 else screen=settingsHtml();
 app.innerHTML=navHtml()+screen+
  `<div class="fineprint">Verdict bands: 90–100 ready for development · 75–89 minor improvements · 60–74 needs refinement · &lt;60 not ready<br>
   Composite = Σ(criterion score × weight), 10 mandatory criteria, weights Σ 100 · scored by ${model().name} over MCP-connected Jira</div>`;
}

/* ═══ Actions ════════════════════════════════════════════════ */
function saveNotes(){const ta=document.getElementById("notesta");if(ta)S.notesText=ta.value;}
window.go=id=>{saveNotes();S.screen=id;render();};
window.pickStory=i=>{S.storyIdx=i;S.openCrit=null;render();};
window.pickLlm=id=>{saveNotes();S.llm=id;render();};
window.pickPersona=p=>{S.persona=p;render();};
window.toggleCrit=n=>{S.openCrit=S.openCrit===n?null:n;render();};
window.acceptFix=(key,rule)=>{S.accepted.add(key+rule);render();};
window.acceptAll=key=>{fixesOf(STORIES.find(s=>s.key===key)).forEach(f=>S.accepted.add(key+f.rule));render();};
window.applyJira=key=>{S.applied.add(key);render();};
window.notesTab=t=>{saveNotes();S.notesTab=t;render();};
window.genDrafts=()=>{saveNotes();S.generated=true;render();};
window.openStory=i=>{S.storyIdx=i;S.screen="scorecard";S.openCrit=null;render();};
window.lintHover=i=>{
 const box=document.getElementById("lintnote");
 if(!box)return;
 if(i===null){box.style.background="var(--bg)";box.innerHTML='<span style="color:var(--soft)">Hover a highlighted phrase to see why it was flagged.</span>';return;}
 const p=STORIES[S.storyIdx].lint[i];
 box.style.background=p.kind==="test"?"var(--red-soft)":"var(--amber-soft)";
 box.innerHTML=`<span class="ruletag ${p.kind}">${p.rule}</span>${p.note}`;
};

render();
</script>
