<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Requirement Linter — Sprint Readiness</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.5.0/tabler-icons.min.css"/>
<style>
:root{
  --navy:#0E1A2B; --ink:#1E2E45; --teal:#16B8A6; --teal-d:#0E8A7D;
  --surface-2:#ffffff; --surface-1:#F4F7FA; --page:#EDF1F6;
  --border:#E2E8F0; --border-strong:#CBD5E1;
  --text-primary:#1E2E45; --text-secondary:#5B6B80; --text-muted:#94A3B8;
  --text-success:#2E9E4B; --bg-success:#E7F6EC;
  --text-warning:#B07A00; --bg-warning:#FBF0DA;
  --text-danger:#C0392B; --bg-danger:#FBE9E7;
  --text-accent:#0E8A7D; --bg-accent:#E7F8F5;
  --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;}
body{margin:0; background:var(--page); font-family:var(--sans); color:var(--text-primary); -webkit-font-smoothing:antialiased;}
.wrap{max-width:1120px; margin:0 auto; padding:28px 24px 48px;}
.topbar{display:flex; align-items:center; gap:12px; margin-bottom:18px;}
.brand{display:flex; align-items:center; gap:10px;}
.dot3 span{display:inline-block; width:11px; height:11px; border-radius:50%; margin-right:4px;}
h1{font-size:20px; font-weight:600; margin:0;}
.sub{font-size:13px; color:var(--text-muted); margin-top:2px;}
.chip{font-size:12px; color:var(--text-accent); background:var(--bg-accent); padding:5px 12px; border-radius:20px; white-space:nowrap;}
.metrics{display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:18px;}
.metric{background:var(--surface-1); border-radius:10px; padding:14px 16px;}
.metric .l{font-size:12px; color:var(--text-secondary);}
.metric .v{font-size:26px; font-weight:600; margin-top:3px;}
.section-l{font-size:12px; color:var(--text-secondary); margin:0 0 8px; letter-spacing:.03em;}
.spread{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:22px;}
.tile{width:40px; height:40px; border-radius:8px; border:none; color:#fff; font-size:12px; font-weight:600; cursor:pointer;}
.grid{display:grid; grid-template-columns:280px 1fr; gap:18px; align-items:start;}
.list{display:flex; flex-direction:column; gap:6px;}
.row{display:flex; align-items:center; gap:10px; text-align:left; width:100%; padding:10px 11px; border:1px solid var(--border); border-radius:9px; background:var(--surface-2); cursor:pointer; font-family:var(--sans);}
.row:hover{border-color:var(--border-strong);}
.row .k{font-family:var(--mono); font-size:11px; color:var(--text-muted);}
.row .t{font-size:13px; color:var(--text-primary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:block;}
.rowdot{width:9px; height:9px; border-radius:50%; flex:none;}
.detail{background:var(--surface-2); border:1px solid var(--border); border-radius:12px; padding:18px 20px;}
.pill{font-size:11px; padding:2px 10px; border-radius:20px; white-space:nowrap;}
.codeblk{font-family:var(--mono); font-size:12px; background:var(--surface-1); border-radius:8px; padding:9px 11px; margin:5px 0; line-height:1.5;}
.foot{margin-top:26px; font-size:12px; color:var(--text-muted); text-align:center;}
@media(max-width:720px){.grid{grid-template-columns:1fr;} .metrics{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <span class="dot3"><span style="background:#E5484D"></span><span style="background:#F4B740"></span><span style="background:#3FB950"></span></span>
    <div style="flex:1">
      <h1>Requirement Linter — Sprint 24 readiness</h1>
      <div class="sub">BenInsights · next sprint · 14 stories · read-only view of verdicts</div>
    </div>
    <span class="chip"><i class="ti ti-bolt"></i> scored in 20s</span>
  </div>
  <div class="metrics" id="metrics"></div>
  <div class="section-l">Readiness spread — click a tile or a story</div>
  <div class="spread" id="spread"></div>
  <div class="grid">
    <div class="list" id="list"></div>
    <div class="detail" id="detail"></div>
  </div>
  <div class="foot">Demo data · synthetic stories · no client data. Verdicts generated by the Requirement Linter scoring engine.</div>
</div>
<script>
var S = [
 {k:"BEN-1201",t:"Display member ID card",rag:"g",s:88,gaps:[],q:[],gk:["Given a logged-in member / When they open ID Card / Then the front and back render with member ID, group and plan"],flag:null},
 {k:"BEN-1202",t:"Filter claims by date range",rag:"g",s:84,gaps:[],q:[],gk:["Given a member with claims / When a date range is applied / Then only claims in range are listed, newest first"],flag:null},
 {k:"BEN-1203",t:"Download an EOB as PDF",rag:"g",s:82,gaps:[{d:"Non-functional",sev:"low",f:"No size limit stated for multi-page EOBs",w:"large files may time out on mobile"}],q:[],gk:["Given a finalized claim / When the member taps Download EOB / Then a PDF is generated and downloaded"],flag:null},
 {k:"BEN-1204",t:"Show deductible progress bar",rag:"g",s:79,gaps:[{d:"Data & field rules",sev:"low",f:"Rounding rule for the remaining amount not stated",w:"cents vs whole-dollar display can mismatch the claim"}],q:["Round the remaining deductible to whole dollars?"],gk:["Given a member with a deductible / When they open Benefits / Then met and remaining amounts show against the plan max"],flag:null},
 {k:"BEN-1205",t:"Update communication preferences",rag:"g",s:77,gaps:[{d:"Negative paths",sev:"low",f:"No confirmation shown after a failed save",w:"member cannot tell whether the change persisted"}],q:["What is shown if the preferences service is unavailable?"],gk:["Given a member on Preferences / When they toggle email off and save / Then the change persists and a confirmation shows"],flag:null},
 {k:"BEN-1206",t:"Search providers by specialty",rag:"g",s:76,gaps:[{d:"Edge cases",sev:"low",f:"No empty-state for a specialty with no in-network providers",w:"member sees a blank list with no guidance"}],q:["What shows when no in-network providers match?"],gk:["Given a member / When they search a specialty / Then in-network providers show, sorted by distance"],flag:null},
 {k:"BEN-1210",t:"Estimate out-of-pocket cost",rag:"a",s:71,gaps:[{d:"Data & field rules",sev:"med",f:"Cost basis (allowed vs billed) not specified",w:"estimate can be off by the negotiated discount"},{d:"Dependencies",sev:"med",f:"Depends on the accumulators service, not stated",w:"stale deductible data gives a wrong estimate"}],q:["Estimate from allowed amount or billed charge?","Which accumulators feed the calculation?"],gk:["Given a member and a procedure code / When they request an estimate / Then the out-of-pocket cost reflects current accumulators"],flag:null},
 {k:"BEN-1211",t:"Show benefit accumulators",rag:"a",s:66,gaps:[{d:"Edge cases",sev:"med",f:"No behaviour across a plan-year boundary",w:"accumulators reset mid-view and confuse the member"},{d:"Testable ACs",sev:"med",f:"'Show accumulators' has no measurable criteria",w:"QA cannot assert which fields must appear"}],q:["Which accumulators are in scope?","How is a mid-year plan change handled?"],gk:["Given a member with an active plan / When they open Accumulators / Then each shows used, remaining and limit for the plan year"],flag:null},
 {k:"BEN-1212",t:"Add a dependent to coverage",rag:"a",s:62,gaps:[{d:"Negative paths",sev:"high",f:"No path when the dependent exceeds the age limit",w:"ineligible dependent could be added silently"},{d:"Data & field rules",sev:"med",f:"Required fields for a dependent not enumerated",w:"partial records reach enrolment"}],q:["What are the eligibility rules (age, relationship)?","Which fields are mandatory vs optional?"],gk:["Given an eligible member / When they add a dependent within the age limit / Then the dependent is queued for enrolment"],flag:null},
 {k:"BEN-1213",t:"Flag prior-auth required services",rag:"a",s:58,gaps:[{d:"Dependencies",sev:"high",f:"Source of the prior-auth rule set is unstated",w:"a stale rule set flags the wrong services"},{d:"Negative paths",sev:"med",f:"No behaviour when the rules service is unavailable",w:"member may proceed without a needed auth"}],q:["Where does the prior-auth rule set come from?","What shows if the rules service is down?"],gk:["Given a service requiring prior auth / When the member views it / Then a prior-auth-required notice is shown with next steps"],flag:null},
 {k:"BEN-1214",t:"Notify on claim status change",rag:"a",s:52,gaps:[{d:"Data & field rules",sev:"high",f:"Which status transitions trigger a notification is undefined",w:"members are over- or under-notified"},{d:"Non-functional",sev:"med",f:"No delivery channel or timing stated",w:"cannot verify SLA or opt-out"}],q:["Which transitions notify (e.g. Denied, Paid)?","Channel and timing for the notification?"],gk:["Given a claim moving to Denied / When the transition is recorded / Then the member is notified per their channel preference"],flag:"References the status value set defined on linked parent BEN-1180"},
 {k:"BEN-1234",t:"View claim status",rag:"r",s:42,gaps:[{d:"Negative paths",sev:"high",f:"No behaviour when the claim-status service times out",w:"member sees a blank screen and files a support ticket"},{d:"Data & field rules",sev:"high",f:"Status values are not enumerated",w:"QA cannot assert on undefined states"},{d:"Edge cases / Testable",sev:"med",f:"No empty-state for a member with zero claims; no ACs",w:"only the success path is implied"}],q:["What are the exact claim-status values and their labels?","What is shown when the status service is unavailable?","What does a member with no claims see?"],gk:["Given the status service is unavailable / When the member opens Claim Status / Then an inline retry message shows and the error is logged","Given a member with at least one claim / When they open Claim Status / Then each claim shows a status from the approved value set"],flag:"Status value set contradicts the enum on linked parent BEN-1180"},
 {k:"BEN-1220",t:"Appeal a denied claim",rag:"r",s:38,gaps:[{d:"Negative paths",sev:"high",f:"No path when the appeal window has closed",w:"member submits an appeal that will be auto-rejected"},{d:"Dependencies",sev:"high",f:"Required documents and their source unstated",w:"appeals submitted without evidence stall"},{d:"Testable ACs",sev:"med",f:"No acceptance criteria beyond 'member can appeal'",w:"nothing to test the flow against"}],q:["What is the appeal window and how is it enforced?","Which supporting documents are required?"],gk:["Given a denied claim within the appeal window / When the member submits an appeal with documents / Then a case is created and acknowledged"],flag:null},
 {k:"BEN-1221",t:"Override a benefit for a member",rag:"r",s:29,gaps:[{d:"Out-of-scope",sev:"high",f:"No boundary on who may override or which benefits",w:"opens an un-audited path to change coverage"},{d:"Non-functional",sev:"high",f:"No audit-trail or authorization requirement stated",w:"a compliance and security gap in a payer system"},{d:"Data & field rules",sev:"high",f:"Override reason codes not defined",w:"overrides cannot be reported or reversed"}],q:["Who is authorized to override, and with what approval?","Is every override audit-logged with a reason code?"],gk:["Given an authorized user with approval / When they override a benefit with a reason code / Then the change is applied and audit-logged"],flag:"Conflicts with the authorization model in linked story BEN-1190"}
];
var RAG={g:{lab:"Green",tx:"var(--text-success)",bg:"var(--bg-success)"},a:{lab:"Amber",tx:"var(--text-warning)",bg:"var(--bg-warning)"},r:{lab:"Red",tx:"var(--text-danger)",bg:"var(--bg-danger)"}};
var SEV={high:{t:"var(--text-danger)",b:"var(--bg-danger)"},med:{t:"var(--text-warning)",b:"var(--bg-warning)"},low:{t:"var(--text-secondary)",b:"var(--surface-1)"}};
var g=S.filter(x=>x.rag=="g").length,a=S.filter(x=>x.rag=="a").length,r=S.filter(x=>x.rag=="r").length;
var avg=Math.round(S.reduce((n,x)=>n+x.s,0)/S.length);
function card(l,v,c){return '<div class="metric"><div class="l">'+l+'</div><div class="v" style="color:'+c+'">'+v+'</div></div>';}
document.getElementById("metrics").innerHTML=card("Avg readiness",avg,"var(--text-primary)")+card("Ready",g,"var(--text-success)")+card("Needs work",a,"var(--text-warning)")+card("Blocked",r,"var(--text-danger)");
var sp=document.getElementById("spread");
S.forEach(function(x,i){var b=document.createElement("button");b.className="tile";b.title=x.k+" · "+x.t+" · score "+x.s;b.style.background=RAG[x.rag].tx;b.textContent=RAG[x.rag].lab[0];b.setAttribute("aria-label",x.k+" "+RAG[x.rag].lab);b.onclick=function(){select(i);};sp.appendChild(b);});
var list=document.getElementById("list");
S.forEach(function(x,i){var row=document.createElement("button");row.className="row";row.id="row"+i;row.innerHTML='<span class="rowdot" style="background:'+RAG[x.rag].tx+'"></span><span style="flex:1;min-width:0"><span class="k">'+x.k+'</span><span class="t">'+x.t+'</span></span><span style="font-size:13px;font-weight:600;color:'+RAG[x.rag].tx+'">'+x.s+'</span>';row.onclick=function(){select(i);};list.appendChild(row);});
function pill(t,tx,bg){return '<span class="pill" style="color:'+tx+';background:'+bg+'">'+t+'</span>';}
function select(i){
 S.forEach(function(_,j){var rw=document.getElementById("row"+j);rw.style.background=(j==i)?"var(--surface-1)":"var(--surface-2)";rw.style.borderColor=(j==i)?"var(--border-strong)":"var(--border)";});
 var x=S[i],h="";
 h+='<div style="display:flex;justify-content:space-between;gap:10px;margin-bottom:12px"><div><div style="font-family:var(--mono);font-size:12px;color:var(--text-muted)">'+x.k+'</div><div style="font-size:17px;font-weight:600;margin-top:2px">'+x.t+'</div></div>'+pill(RAG[x.rag].lab+" · "+x.s,RAG[x.rag].tx,RAG[x.rag].bg)+'</div>';
 h+='<div class="section-l">GAPS'+(x.gaps.length?' — each with a why':'')+'</div>';
 if(!x.gaps.length){h+='<div style="font-size:13px;color:var(--text-success)"><i class="ti ti-check"></i> No blocking gaps — meets the Definition of Ready.</div>';}
 else{x.gaps.forEach(function(gp){h+='<div style="padding:9px 0;border-top:1px solid var(--border)"><div style="display:flex;gap:8px;align-items:center;margin-bottom:3px">'+pill(gp.d,SEV[gp.sev].t,SEV[gp.sev].b)+'<span style="font-size:11px;color:var(--text-muted)">'+gp.sev+'</span></div><div style="font-size:13px">'+gp.f+'</div><div style="font-size:12px;color:var(--text-secondary);font-style:italic;margin-top:2px">why: '+gp.w+'</div></div>';});}
 if(x.q.length){h+='<div class="section-l" style="margin-top:14px">CLARIFYING QUESTIONS</div>';x.q.forEach(function(q){h+='<div style="font-size:13px;margin:4px 0;padding-left:18px;text-indent:-18px"><i class="ti ti-help-circle" style="color:var(--text-accent);margin-right:6px"></i>'+q+'</div>';});}
 h+='<div class="section-l" style="margin-top:14px">DRAFT ACCEPTANCE CRITERIA</div>';x.gk.forEach(function(gg){h+='<div class="codeblk">'+gg+'</div>';});
 if(x.flag){h+='<div style="display:flex;gap:8px;margin-top:14px;padding:9px 11px;background:var(--bg-warning);border-radius:8px"><i class="ti ti-git-branch" style="color:var(--text-warning);font-size:15px"></i><div style="font-size:12px;color:var(--text-warning)"><b style="font-weight:600">Cross-story flag —</b> '+x.flag+'</div></div>';}
 document.getElementById("detail").innerHTML=h;
}
select(11);
</script>
</body>
</html>
